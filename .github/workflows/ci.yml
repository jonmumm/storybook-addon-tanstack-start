name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: vp check src/
      - run: vp exec knip
      - run: vp test
      - run: vp pack

  integration:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - name: Build addon package
        run: vp install && vp pack
      - name: Install test-app dependencies
        working-directory: test-app
        run: pnpm install --no-frozen-lockfile
      - name: Build Storybook (integration test)
        working-directory: test-app
        run: pnpm exec storybook build
